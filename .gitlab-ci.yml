stages:
  - build
  - push
  - deploy

variables:
  IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  IMAGE_LATEST: $CI_REGISTRY_IMAGE:latest

# 1️⃣ Build Docker image
build:
  stage: build
  image: docker:24-dind
  services:
    - docker:24-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $IMAGE_TAG -t $IMAGE_LATEST .
  only:
    - main
    - develop

# 2️⃣ Push Docker image sur GitLab Registry
push:
  stage: push
  image: docker:24-dind
  services:
    - docker:24-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker push $IMAGE_TAG
    - docker push $IMAGE_LATEST
  only:
    - main
    - develop

# 3️⃣ Déploiement sur Render (ou autre hébergeur)
deploy_staging:
  stage: deploy
  image: curlimages/curl:latest
  script:
    - curl -X POST $RENDER_STAGING_DEPLOY_HOOK_URL
  only:
    - develop
  environment:
    name: staging
    url: https://ecole-des-maris-staging.onrender.com

deploy_production:
  stage: deploy
  image: curlimages/curl:latest
  script:
    - curl -X POST $RENDER_DEPLOY_HOOK_URL
  only:
    - main
  environment:
    name: production
    url: https://ecole-des-maris.onrender.com